<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Einkaufsliste</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🛒</text></svg>">
    <style>
        /* Alle bestehenden Styles aus der vorherigen Version – unverändert */
    </style>
</head>
<body>
    <!-- Container, Header, Auth-Box, App-Content wie gehabt -->
    
    <!-- NEU: Modal für Passwort ändern -->
    <div id="passwordModal" class="modal-overlay hidden">
        <div class="modal">
            <button class="close-modal" onclick="closePasswordModal()">✖</button>
            <h3>🔒 Passwort ändern</h3>
            <input type="password" id="oldPasswordInput" placeholder="Altes Passwort">
            <input type="password" id="newPasswordInput" placeholder="Neues Passwort (min. 3 Zeichen)">
            <button class="btn btn-primary" onclick="changePassword()">Passwort ändern</button>
            <div id="passwordResult" class="share-email-result"></div>
        </div>
    </div>

    <!-- Alle anderen Modals unverändert -->

    <script>
        // Alle bestehenden JavaScript-Funktionen unverändert

        // NEU: Passwort-Modal öffnen/schließen
        function openPasswordModal() {
            document.getElementById('passwordModal').classList.remove('hidden');
            document.getElementById('oldPasswordInput').value = '';
            document.getElementById('newPasswordInput').value = '';
            document.getElementById('passwordResult').textContent = '';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.add('hidden');
        }

        // NEU: Passwort ändern
        async function changePassword() {
            const altesPasswort = document.getElementById('oldPasswordInput').value;
            const neuesPasswort = document.getElementById('newPasswordInput').value;
            const resultDiv = document.getElementById('passwordResult');

            if (!altesPasswort || !neuesPasswort) {
                resultDiv.textContent = 'Bitte beide Felder ausfüllen.';
                resultDiv.className = 'share-email-result error';
                return;
            }

            try {
                const resp = await apiCall(API_URL + '/user/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ altesPasswort, neuesPasswort })
                });

                if (resp.ok) {
                    resultDiv.textContent = '✅ Passwort erfolgreich geändert.';
                    resultDiv.className = 'share-email-result success';
                    document.getElementById('oldPasswordInput').value = '';
                    document.getElementById('newPasswordInput').value = '';
                } else {
                    const msg = await resp.text();
                    resultDiv.textContent = '❌ ' + (msg || 'Fehler beim Ändern.');
                    resultDiv.className = 'share-email-result error';
                }
            } catch {
                resultDiv.textContent = '❌ Server nicht erreichbar.';
                resultDiv.className = 'share-email-result error';
            }
        }

        // NEU: Button im Header hinzufügen (direkt nach dem Logout-Button)
        // Dieser Teil muss im HTML an der passenden Stelle eingefügt werden:
        // <button class="btn" onclick="openPasswordModal()">🔒</button>
    </script>
</body>
</html>
