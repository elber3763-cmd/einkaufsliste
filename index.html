<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Einkaufsliste</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🛒</text></svg>">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ece9e6 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.4s;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12);
            padding: 32px 28px;
            width: 100%;
            max-width: 620px;
            transition: background 0.4s, box-shadow 0.4s, border-color 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        body.dark-mode .container {
            background: rgba(38, 38, 60, 0.9);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.dark-mode .header h1 {
            background: linear-gradient(135deg, #9b8cf2, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #444;
            transition: all 0.25s;
            backdrop-filter: blur(6px);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: none;
        }

        body.dark-mode .btn {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: #ddd;
        }

        body.dark-mode .btn:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd6, #6a4190);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.35);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        .btn-danger {
            border-color: #ff8a80;
            color: #e53935;
        }

        .btn-danger:hover {
            background: #ff8a80;
            color: white;
            border-color: transparent;
        }

        .btn-danger:active {
            transform: scale(0.96);
        }

        body.dark-mode .btn-danger {
            border-color: #ff8a80;
            color: #ff8a80;
        }

        body.dark-mode .btn-danger:hover {
            background: #ff8a80;
            color: #1e1e2f;
        }

        .btn-selection {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #90caf9;
            color: #1976d2;
        }

        body.dark-mode .btn-selection {
            background: rgba(255, 255, 255, 0.1);
            border-color: #64b5f6;
            color: #90caf9;
        }

        .btn-selection:hover {
            background: rgba(255, 255, 255, 0.95);
        }

        body.dark-mode .btn-selection:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .btn-aktivitaeten {
            background: transparent;
            border: 2px solid #90caf9;
            color: #1976d2;
        }

        body.dark-mode .btn-aktivitaeten {
            border-color: #64b5f6;
            color: #90caf9;
        }

        .druck-btn {
            background: transparent;
            border: 2px solid #999;
            color: #666;
        }
        body.dark-mode .druck-btn {
            color: #aaa;
            border-color: #aaa;
        }
        .druck-btn:hover {
            background: #eee;
        }

        /* Auth Box */
        .auth-box {
            background: rgba(248, 249, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: background 0.4s, border-color 0.4s;
        }

        body.dark-mode .auth-box {
            background: rgba(60, 60, 90, 0.7);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .auth-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.8);
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        body.dark-mode .auth-box input {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: #eee;
        }

        .auth-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .auth-buttons {
            display: flex;
            gap: 14px;
            margin-top: 18px;
        }

        .auth-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }

        .login-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .login-btn:hover {
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.35);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: scale(0.96);
        }

        .register-btn {
            background: rgba(0, 0, 0, 0.05);
            color: #444;
        }

        body.dark-mode .register-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #ddd;
        }

        .register-btn:active {
            transform: scale(0.96);
        }

        .auth-message {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            min-height: 22px;
        }

        .error { color: #e74c3c; }
        .success { color: #4CAF50; }

        .hidden { display: none !important; }

        /* Listen-Übersicht */
        .liste-row {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 18px;
            padding: 18px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.25s, box-shadow 0.25s, transform 0.2s;
            flex-wrap: wrap;
            gap: 10px;
        }

        .liste-row:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
            transform: translateY(-2px);
        }

        .liste-row.geteilt {
            border-left: 4px solid #667eea;
        }

        .liste-name {
            font-weight: 600;
            color: #333;
        }

        body.dark-mode .liste-name {
            color: #ddd;
        }

        .liste-actions {
            display: flex;
            gap: 8px;
        }

        /* Artikel */
        .artikel-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            transition: background 0.2s, padding-left 0.2s;
            flex-wrap: wrap;
        }

        .artikel-item:last-child {
            border-bottom: none;
        }

        .artikel-item:hover {
            background: rgba(0, 0, 0, 0.015);
        }

        body.dark-mode .artikel-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .artikel-item.erledigt {
            opacity: 0.85;
        }

        .artikel-item.erledigt + .artikel-item:not(.erledigt) {
            margin-top: 8px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0, 0, 0, 0.1);
        }

        body.dark-mode .artikel-item.erledigt + .artikel-item:not(.erledigt) {
            border-top-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode .artikel-item {
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }

        /* Fälligkeit */
        .artikel-item.faellig {
            background: rgba(255, 138, 128, 0.08);
            border-left: 3px solid #ff8a80;
            padding-left: 12px;
        }

        body.dark-mode .artikel-item.faellig {
            background: rgba(255, 138, 128, 0.15);
        }

        .artikel-checkbox,
        .auswahl-checkbox {
            width: 24px;
            height: 24px;
            min-width: 24px;
            cursor: pointer;
            accent-color: #667eea;
            transform: scale(1.1);
            transition: transform 0.15s, opacity 0.2s;
        }

        .artikel-checkbox:hover,
        .auswahl-checkbox:hover {
            transform: scale(1.25);
        }

        .auswahl-checkbox {
            margin-right: 4px;
        }

        .artikel-text {
            flex: 1;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            word-break: break-word;
            min-width: 120px;
            transition: color 0.2s, text-decoration 0.2s;
        }

        .artikel-text.erledigt {
            text-decoration: line-through;
            text-decoration-thickness: 2px;
            text-decoration-color: rgba(0,0,0,0.25);
            color: #aaa;
        }

        body.dark-mode .artikel-text {
            color: #eee;
        }

        body.dark-mode .artikel-text.erledigt {
            color: #777;
            text-decoration-color: rgba(255,255,255,0.2);
        }

        .artikel-menge {
            width: 100px;
            min-width: 60px;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            text-align: right;
        }

        body.dark-mode .artikel-menge {
            color: #aaa;
        }

        .artikel-datum {
            font-size: 12px;
            color: #999;
            margin-left: 8px;
            white-space: nowrap;
        }

        .artikel-item.faellig .artikel-datum {
            color: #e53935;
            font-weight: 600;
        }

        body.dark-mode .artikel-item.faellig .artikel-datum {
            color: #ff8a80;
        }

        .artikel-autor {
            font-size: 11px;
            color: #888;
            margin-left: 8px;
            white-space: nowrap;
        }

        .faellig-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-left: 12px;
            font-size: 13px;
            font-weight: 600;
            color: #e53935;
            background: rgba(255, 138, 128, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        body.dark-mode .faellig-badge {
            color: #ff8a80;
            background: rgba(255, 138, 128, 0.25);
        }

        .sort-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .sort-row label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
        }

        body.dark-mode .sort-row label {
            color: #ccc;
        }

        select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            font-size: 14px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            cursor: pointer;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        body.dark-mode select {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: #eee;
        }

        /* Bulk‑Aktionen Leiste */
        .bulk-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .bulk-bar span {
            font-size: 14px;
            font-weight: 500;
            color: #444;
        }

        body.dark-mode .bulk-bar span {
            color: #ccc;
        }

        .neue-liste-form,
        .neuer-artikel-form {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .neue-liste-form input,
        .neuer-artikel-form input {
            flex: 1;
            min-width: 150px;
            padding: 14px 16px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.8);
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        body.dark-mode .neue-liste-form input,
        body.dark-mode .neuer-artikel-form input {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: #eee;
        }

        .neue-liste-form input:focus,
        .neuer-artikel-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .back-btn {
            margin-bottom: 18px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h3 { margin-bottom: 15px; }

        .modal input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .close-modal {
            float: right;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-divider {
            margin: 20px 0;
            border-top: 1px solid #e0e0e0;
        }

        .share-email-result,
        .aktivitaet-eintrag {
            font-size: 13px;
            margin-top: 5px;
        }

        .aktivitaet-eintrag {
            border-bottom: 1px solid #eee;
            padding: 8px 0;
        }

        body.dark-mode .aktivitaet-eintrag {
            border-bottom-color: #555;
        }

        /* Listen-Header */
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        body.dark-mode h2 {
            color: #eee;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        body.dark-mode ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        /* Druck-Stile */
        @media print {
            body {
                background: white !important;
                padding: 0;
                margin: 0;
            }
            .container {
                box-shadow: none;
                border: none;
                padding: 20px;
                backdrop-filter: none;
                background: white !important;
                max-width: 100%;
            }
            .header-buttons,
            .btn,
            .sort-row,
            .bulk-bar,
            .neue-liste-form,
            .neuer-artikel-form,
            .back-btn,
            .faellig-badge,
            .druck-btn,
            .modal-overlay,
            .tabs,
            .manage-kat-btn,
            .logout-btn,
            .dark-mode-btn,
            .auth-box,
            .hidden,
            .neue-liste-form,
            .artikel-item .loesch-btn,
            .edit-btn,
            .auswahl-checkbox,
            .artikel-actions,
            .liste-actions,
            .modal,
            .close-modal,
            .btn-primary,
            .btn-danger,
            .btn-selection,
            .btn-aktivitaeten,
            .faellig-badge,
            .bulk-bar,
            .sort-row label,
            select,
            .artikel-checkbox,
            .auswahl-checkbox {
                display: none !important;
            }
            .artikel-item {
                border-bottom: 1px solid #ccc;
                padding: 8px 0;
                display: flex;
                align-items: center;
            }
            .artikel-text {
                color: black !important;
                font-size: 14px;
            }
            .artikel-text.erledigt {
                color: #666 !important;
                text-decoration: line-through;
            }
            .artikel-menge {
                color: black !important;
                font-size: 13px;
            }
            .artikel-datum {
                color: #555 !important;
            }
            .artikel-autor {
                color: #555 !important;
            }
            .liste-row {
                border: 1px solid #ccc;
                background: transparent;
                box-shadow: none;
                padding: 10px;
                margin-bottom: 8px;
            }
            h1, h2, h3 {
                color: black !important;
                -webkit-text-fill-color: black !important;
                background: none !important;
            }
            .artikel-item.faellig {
                background: none !important;
                border-left: 3px solid #e53935;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .container {
                padding: 24px 16px;
                border-radius: 22px;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
            .liste-row {
                padding: 16px 16px;
            }
            .artikel-item {
                gap: 10px;
                padding: 14px 0;
            }
            .artikel-text {
                font-size: 15px;
            }
            .artikel-menge {
                width: 70px;
                font-size: 13px;
            }
            .neue-liste-form input,
            .neuer-artikel-form input {
                padding: 12px 14px;
                font-size: 15px;
            }
            h2 {
                font-size: 1.35rem;
            }
        }

        @media (max-width: 360px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-buttons {
                width: 100%;
                justify-content: flex-end;
            }
            .btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            .artikel-checkbox,
            .auswahl-checkbox {
                width: 22px;
                height: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛒 Meine Einkaufsliste</h1>
            <div class="header-buttons">
                <button id="darkModeToggle" class="btn" onclick="toggleDarkMode()">🌙</button>
                <button id="logoutBtn" class="btn btn-danger hidden" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Auth -->
        <div id="authBox" class="auth-box">
            <input type="email" id="authEmail" placeholder="E-Mail" autocomplete="email">
            <input type="password" id="authPassword" placeholder="Passwort" autocomplete="current-password">
            <div class="auth-buttons">
                <button class="auth-btn login-btn" onclick="login()">Anmelden</button>
                <button class="auth-btn register-btn" onclick="register()">Registrieren</button>
            </div>
            <div id="authMessage" class="auth-message"></div>
        </div>

        <!-- Hauptansicht (nach Login) -->
        <div id="appContent" class="hidden">
            <!-- Listen-Übersicht -->
            <div id="listenView">
                <h2>Meine Listen</h2>
                <div class="neue-liste-form">
                    <input type="text" id="neueListeInput" placeholder="Neue Liste...">
                    <button class="btn btn-primary" onclick="neueListe()">➕</button>
                </div>
                <div id="listenContainer"></div>
            </div>

            <!-- Artikel-Ansicht (Detail) -->
            <div id="artikelView" class="hidden">
                <button class="btn back-btn" onclick="zurueckZuListen()">← Zurück</button>
                <h2 id="aktuelleListeName"></h2>

                <!-- Sortierung & Auswahl‑Modus & Aktivitäten -->
                <div class="sort-row">
                    <label for="sortSelect">Sortierung:</label>
                    <select id="sortSelect" onchange="loadArtikel()">
                        <option value="created">Neueste zuerst</option>
                        <option value="name">Name (A–Z)</option>
                        <option value="erledigt">Status (Offen zuerst)</option>
                        <option value="faellig">Fälligkeit (Nächste zuerst)</option>
                    </select>
                    <button id="toggleSelectionBtn" class="btn btn-selection" onclick="toggleSelectionMode()">✏️ Auswahl</button>
                    <button class="btn btn-aktivitaeten" onclick="openAktivitaetenModal()">📜 Aktivitäten</button>
                    <button class="btn druck-btn" onclick="window.print()">🖨️ Drucken</button>
                    <span id="faelligBadge" class="faellig-badge hidden" onclick="filterFaellig()">⚠️ <span id="faelligCount">0</span> überfällig</span>
                </div>

                <!-- Bulk‑Aktionsleiste (im Auswahl‑Modus sichtbar) -->
                <div id="bulkBar" class="bulk-bar hidden">
                    <button class="btn" onclick="selectAll()">Alle auswählen</button>
                    <button class="btn" onclick="bulkToggle()">Erledigt umschalten</button>
                    <button class="btn btn-danger" onclick="bulkDelete()">Löschen</button>
                    <span id="selectedCount"></span>
                </div>

                <div class="neuer-artikel-form">
                    <input type="text" id="neuerArtikelName" placeholder="Artikelname">
                    <input type="text" id="neuerArtikelMenge" placeholder="Menge (z.B. 2 Stk.)" style="max-width:150px;">
                    <input type="date" id="neuerArtikelFaellig" style="max-width:160px;">
                    <button class="btn btn-primary" onclick="neuerArtikel()">➕</button>
                </div>
                <div id="artikelContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modal für Freigabe-Link UND E-Mail-Freigabe -->
    <div id="shareModal" class="modal-overlay hidden">
        <div class="modal">
            <button class="close-modal" onclick="closeShareModal()">✖</button>
            <h3>🔗 Liste teilen</h3>
            <p style="margin-bottom:10px;font-size:14px;">Teile diesen Link mit anderen, damit sie die Liste bearbeiten können.</p>
            <input type="text" id="shareLinkInput" readonly>
            <button class="btn btn-primary" onclick="copyShareLink()">📋 Link kopieren</button>
            <span id="copyConfirmation" style="margin-left:10px;font-size:13px;color:#4CAF50;" class="hidden">Kopiert!</span>

            <div class="modal-divider"></div>

            <h3>📧 Per E-Mail teilen</h3>
            <p style="margin-bottom:10px;font-size:14px;">Gib die registrierte E-Mail-Adresse des Nutzers ein, um die Liste direkt mit ihm zu teilen.</p>
            <input type="email" id="shareEmailInput" placeholder="E-Mail-Adresse">
            <button class="btn btn-primary" onclick="shareViaEmail()">Teilen</button>
            <div id="shareEmailResult" class="share-email-result"></div>
        </div>
    </div>

    <!-- Modal für Aktivitäten-Feed -->
    <div id="aktivitaetenModal" class="modal-overlay hidden">
        <div class="modal">
            <button class="close-modal" onclick="closeAktivitaetenModal()">✖</button>
            <h3>📜 Aktivitäten</h3>
            <div id="aktivitaetenContainer"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://einkaufsliste-api.elber3763.workers.dev/api';
        let listen = [];
        let aktuelleListeId = null;
        let artikel = [];
        let selectionMode = false;
        let selectedIds = new Set();
        let aktuellerBenutzerEmail = '';

        // Dark Mode
        function initDarkMode() {
            const saved = localStorage.getItem('darkMode');
            if (saved === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkModeToggle').textContent = '☀️';
            }
        }
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('darkModeToggle').textContent = isDark ? '☀️' : '🌙';
        }

        async function apiCall(url, options = {}) {
            const token = localStorage.getItem('token');
            if (token) {
                options.headers = options.headers || {};
                options.headers['Authorization'] = 'Bearer ' + token;
            }
            return fetch(url, options);
        }

        // Beitritt über ?join=TOKEN prüfen
        async function checkJoinToken() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('join');
            if (!token) return;
            try {
                const resp = await apiCall(`${API_URL}/listen/beitreten/${token}`);
                if (resp.ok) {
                    const data = await resp.json();
                    alert('Du bist der Liste erfolgreich beigetreten!');
                    window.history.replaceState({}, document.title, window.location.pathname);
                    loadListen();
                } else {
                    const msg = await resp.text();
                    alert('Beitritt fehlgeschlagen: ' + msg);
                }
            } catch (e) {
                alert('Server nicht erreichbar.');
            }
        }

        window.onload = function() {
            initDarkMode();
            if (localStorage.getItem('token')) {
                nachLogin();
                checkJoinToken();
            }
        };

        async function register() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const msg = document.getElementById('authMessage');
            if (!email || !password) { msg.textContent = 'Bitte ausfüllen.'; msg.className = 'auth-message error'; return; }
            try {
                const resp = await fetch(API_URL + '/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (resp.ok) {
                    msg.textContent = 'Registrierung erfolgreich. Melde dich an.';
                    msg.className = 'auth-message success';
                } else if (resp.status === 409) {
                    msg.textContent = 'E-Mail bereits registriert.';
                    msg.className = 'auth-message error';
                } else {
                    msg.textContent = 'Fehler.';
                    msg.className = 'auth-message error';
                }
            } catch { msg.textContent = 'Server nicht erreichbar.'; msg.className = 'auth-message error'; }
        }

        async function login() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const msg = document.getElementById('authMessage');
            if (!email || !password) { msg.textContent = 'Bitte ausfüllen.'; msg.className = 'auth-message error'; return; }
            try {
                const resp = await fetch(API_URL + '/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (resp.ok) {
                    const data = await resp.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.email);
                    aktuellerBenutzerEmail = data.email;
                    msg.textContent = '';
                    nachLogin();
                    checkJoinToken();
                } else {
                    msg.textContent = 'Ungültige Anmeldedaten.';
                    msg.className = 'auth-message error';
                }
            } catch { msg.textContent = 'Server nicht erreichbar.'; msg.className = 'auth-message error'; }
        }

        function nachLogin() {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('appContent').classList.remove('hidden');
            loadListen();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userEmail');
            location.reload();
        }

        // ---- Listen ----
        async function loadListen() {
            try {
                const resp = await apiCall(API_URL + '/listen');
                if (resp.ok) {
                    listen = await resp.json();
                    renderListen();
                }
            } catch { }
        }

        function renderListen() {
            const container = document.getElementById('listenContainer');
            container.innerHTML = '';
            listen.forEach(liste => {
                const isOwner = liste.is_owner == 1;
                const div = document.createElement('div');
                div.className = 'liste-row' + (isOwner ? '' : ' geteilt');

                const span = document.createElement('span');
                span.className = 'liste-name';
                span.textContent = isOwner ? liste.name : '🔷 ' + liste.name;

                const actions = document.createElement('div');
                actions.className = 'liste-actions';

                if (isOwner) {
                    const shareBtn = document.createElement('button');
                    shareBtn.textContent = '🔗';
                    shareBtn.className = 'btn';
                    shareBtn.title = 'Liste teilen';
                    shareBtn.onclick = (e) => { e.stopPropagation(); openShareModal(liste.id); };
                    actions.appendChild(shareBtn);
                }

                const delBtn = document.createElement('button');
                delBtn.textContent = isOwner ? '🗑️' : '🚪';
                delBtn.className = 'btn';
                delBtn.title = isOwner ? 'Liste löschen' : 'Liste verlassen';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (isOwner) deleteListe(liste.id);
                    else leaveListe(liste.id);
                };
                actions.appendChild(delBtn);

                div.appendChild(span);
                div.appendChild(actions);
                div.onclick = () => oeffneListe(liste.id, liste.name);
                container.appendChild(div);
            });
        }

        async function neueListe() {
            const input = document.getElementById('neueListeInput');
            const name = input.value.trim();
            if (!name) return alert('Name eingeben!');
            try {
                const resp = await apiCall(API_URL + '/listen', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                if (resp.ok) {
                    input.value = '';
                    await loadListen();
                }
            } catch { alert('Fehler.'); }
        }

        async function deleteListe(id) {
            if (!confirm('Liste wirklich löschen?')) return;
            try {
                await apiCall(API_URL + '/listen/' + id, { method: 'DELETE' });
                await loadListen();
            } catch { alert('Fehler beim Löschen.'); }
        }

        async function leaveListe(id) {
            if (!confirm('Möchtest du diese Liste wirklich verlassen?')) return;
            try {
                await apiCall(API_URL + '/listen/' + id + '/verlassen', { method: 'DELETE' });
                await loadListen();
            } catch { alert('Fehler beim Verlassen.'); }
        }

        // ---- Teilen-Modal ----
        let shareListeId = null;

        async function openShareModal(listeId) {
            shareListeId = listeId;
            try {
                const resp = await apiCall(API_URL + '/listen/' + listeId + '/teilen', { method: 'POST' });
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('shareLinkInput').value = data.link;
                } else {
                    document.getElementById('shareLinkInput').value = 'Fehler';
                }
            } catch {
                document.getElementById('shareLinkInput').value = 'Server nicht erreichbar';
            }
            document.getElementById('shareEmailInput').value = '';
            document.getElementById('shareEmailResult').textContent = '';
            document.getElementById('copyConfirmation').classList.add('hidden');
            document.getElementById('shareModal').classList.remove('hidden');
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.add('hidden');
        }

        function copyShareLink() {
            const input = document.getElementById('shareLinkInput');
            input.select();
            input.setSelectionRange(0, 99999);
            document.execCommand('copy');
            document.getElementById('copyConfirmation').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('copyConfirmation').classList.add('hidden');
            }, 2000);
        }

        async function shareViaEmail() {
            const email = document.getElementById('shareEmailInput').value.trim();
            const resultDiv = document.getElementById('shareEmailResult');
            if (!email) {
                resultDiv.textContent = 'Bitte eine E-Mail-Adresse eingeben.';
                resultDiv.className = 'share-email-result error';
                return;
            }

            try {
                const resp = await apiCall(API_URL + '/listen/' + shareListeId + '/teilen-mit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                if (resp.ok) {
                    resultDiv.textContent = '✅ Liste erfolgreich geteilt!';
                    resultDiv.className = 'share-email-result success';
                    document.getElementById('shareEmailInput').value = '';
                } else if (resp.status === 404) {
                    resultDiv.textContent = '❌ Benutzer nicht gefunden.';
                    resultDiv.className = 'share-email-result error';
                } else if (resp.status === 409) {
                    resultDiv.textContent = '❌ Liste ist bereits geteilt.';
                    resultDiv.className = 'share-email-result error';
                } else {
                    resultDiv.textContent = '❌ Fehler beim Teilen.';
                    resultDiv.className = 'share-email-result error';
                }
            } catch {
                resultDiv.textContent = '❌ Server nicht erreichbar.';
                resultDiv.className = 'share-email-result error';
            }
        }

        // ---- Aktivitäten-Modal ----
        async function openAktivitaetenModal() {
            document.getElementById('aktivitaetenModal').classList.remove('hidden');
            const container = document.getElementById('aktivitaetenContainer');
            container.innerHTML = 'Lade...';
            try {
                const resp = await apiCall(API_URL + '/listen/' + aktuelleListeId + '/aktivitaeten');
                if (resp.ok) {
                    const aktivitaeten = await resp.json();
                    container.innerHTML = '';
                    if (aktivitaeten.length === 0) {
                        container.innerHTML = '<p>Keine Aktivitäten bisher.</p>';
                    } else {
                        aktivitaeten.forEach(a => {
                            const div = document.createElement('div');
                            div.className = 'aktivitaet-eintrag';
                            const zeit = new Date(a.zeitpunkt).toLocaleString('de-DE');
                            div.innerHTML = `<strong>${a.username}</strong> ${a.details} <br><small>${zeit}</small>`;
                            container.appendChild(div);
                        });
                    }
                } else {
                    container.innerHTML = 'Fehler beim Laden.';
                }
            } catch {
                container.innerHTML = 'Server nicht erreichbar.';
            }
        }

        function closeAktivitaetenModal() {
            document.getElementById('aktivitaetenModal').classList.add('hidden');
        }

        // ---- Artikel ----
        function oeffneListe(id, name) {
            aktuelleListeId = id;
            document.getElementById('listenView').classList.add('hidden');
            document.getElementById('artikelView').classList.remove('hidden');
            document.getElementById('aktuelleListeName').textContent = '📋 ' + name;
            document.getElementById('sortSelect').value = 'created';
            selectionMode = false;
            selectedIds.clear();
            updateSelectionUI();
            loadArtikel();
        }

        function zurueckZuListen() {
            document.getElementById('artikelView').classList.add('hidden');
            document.getElementById('listenView').classList.remove('hidden');
            loadListen();
        }

        async function loadArtikel() {
            const sort = document.getElementById('sortSelect').value;
            try {
                const resp = await apiCall(API_URL + '/listen/' + aktuelleListeId + '/artikel?sort=' + sort);
                if (resp.ok) {
                    artikel = await resp.json();
                    selectedIds.clear();
                    updateSelectionUI();
                    updateFaelligBadge();
                    renderArtikel();
                }
            } catch { }
        }

        function updateFaelligBadge() {
            const heute = new Date();
            heute.setHours(0, 0, 0, 0);
            let count = 0;
            artikel.forEach(a => {
                if (a.faellig_am) {
                    const faellig = new Date(a.faellig_am);
                    faellig.setHours(0, 0, 0, 0);
                    if (faellig < heute) count++;
                }
            });
            const badge = document.getElementById('faelligBadge');
            const countSpan = document.getElementById('faelligCount');
            if (count > 0) {
                badge.classList.remove('hidden');
                countSpan.textContent = count;
            } else {
                badge.classList.add('hidden');
            }
        }

        function filterFaellig() {
            document.getElementById('sortSelect').value = 'faellig';
            loadArtikel();
        }

        // ---- Bulk‑Aktionen ----
        function toggleSelectionMode() {
            selectionMode = !selectionMode;
            selectedIds.clear();
            updateSelectionUI();
            renderArtikel();
        }

        function updateSelectionUI() {
            const bar = document.getElementById('bulkBar');
            const btn = document.getElementById('toggleSelectionBtn');
            if (selectionMode) {
                bar.classList.remove('hidden');
                btn.textContent = '✅ Fertig';
                btn.classList.add('btn-primary');
            } else {
                bar.classList.add('hidden');
                btn.textContent = '✏️ Auswahl';
                btn.classList.remove('btn-primary');
            }
            document.getElementById('selectedCount').textContent =
                `${selectedIds.size} von ${artikel.length} ausgewählt`;
        }

        function toggleItemSelection(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateSelectionUI();
        }

        function selectAll() {
            if (selectedIds.size === artikel.length) {
                selectedIds.clear();
            } else {
                artikel.forEach(a => selectedIds.add(a.id));
            }
            updateSelectionUI();
            renderArtikel();
        }

        async function bulkToggle() {
            if (selectedIds.size === 0) return alert('Keine Artikel ausgewählt.');
            try {
                const resp = await apiCall(API_URL + '/artikel/batch', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: Array.from(selectedIds), action: 'toggle' })
                });
                if (resp.ok) {
                    await loadArtikel();
                } else {
                    alert('Fehler beim Umschalten.');
                }
            } catch { alert('Server nicht erreichbar.'); }
        }

        async function bulkDelete() {
            if (selectedIds.size === 0) return alert('Keine Artikel ausgewählt.');
            if (!confirm(`${selectedIds.size} Artikel wirklich löschen?`)) return;
            try {
                const resp = await apiCall(API_URL + '/artikel/batch', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: Array.from(selectedIds), action: 'delete' })
                });
                if (resp.ok) {
                    await loadArtikel();
                } else {
                    alert('Fehler beim Löschen.');
                }
            } catch { alert('Server nicht erreichbar.'); }
        }

        function renderArtikel() {
            const container = document.getElementById('artikelContainer');
            container.innerHTML = '';
            artikel.forEach(a => {
                const div = document.createElement('div');
                let cssClass = 'artikel-item';
                if (a.erledigt === 1) cssClass += ' erledigt';
                if (a.faellig_am) {
                    const heute = new Date();
                    heute.setHours(0, 0, 0, 0);
                    const faellig = new Date(a.faellig_am);
                    faellig.setHours(0, 0, 0, 0);
                    if (faellig < heute) {
                        cssClass += ' faellig';
                    }
                }
                div.className = cssClass;

                if (selectionMode) {
                    const selCb = document.createElement('input');
                    selCb.type = 'checkbox';
                    selCb.className = 'auswahl-checkbox';
                    selCb.checked = selectedIds.has(a.id);
                    selCb.onclick = (e) => {
                        e.stopPropagation();
                        toggleItemSelection(a.id);
                        renderArtikel();
                    };
                    div.appendChild(selCb);
                }

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'artikel-checkbox';
                cb.checked = a.erledigt === 1;
                cb.onchange = () => toggleArtikel(a.id, !cb.checked);

                const span = document.createElement('span');
                span.className = 'artikel-text' + (a.erledigt ? ' erledigt' : '');
                span.textContent = a.name;

                const menge = document.createElement('span');
                menge.className = 'artikel-menge';
                menge.textContent = a.menge || '';

                const datumSpan = document.createElement('span');
                datumSpan.className = 'artikel-datum';
                if (a.faellig_am) {
                    const d = new Date(a.faellig_am);
                    datumSpan.textContent = '📅 ' + d.toLocaleDateString('de-DE');
                }

                const autorSpan = document.createElement('span');
                autorSpan.className = 'artikel-autor';
                if (a.added_by_username) {
                    autorSpan.textContent = a.added_by_username === aktuellerBenutzerEmail ? 'von dir' : 'von ' + a.added_by_username;
                }

                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑️';
                delBtn.className = 'btn';
                delBtn.onclick = () => deleteArtikel(a.id);

                div.appendChild(cb);
                div.appendChild(span);
                div.appendChild(menge);
                div.appendChild(datumSpan);
                div.appendChild(autorSpan);
                if (!selectionMode) {
                    div.appendChild(delBtn);
                }

                container.appendChild(div);
            });
        }

        async function neuerArtikel() {
            const nameInput = document.getElementById('neuerArtikelName');
            const mengeInput = document.getElementById('neuerArtikelMenge');
            const faelligInput = document.getElementById('neuerArtikelFaellig');
            const name = nameInput.value.trim();
            const menge = mengeInput.value.trim();
            const faellig = faelligInput.value;
            if (!name) return alert('Name eingeben!');
            try {
                const resp = await apiCall(API_URL + '/listen/' + aktuelleListeId + '/artikel', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, menge, faellig_am: faellig || null })
                });
                if (resp.ok) {
                    nameInput.value = '';
                    mengeInput.value = '';
                    faelligInput.value = '';
                    await loadArtikel();
                }
            } catch { alert('Fehler.'); }
        }

        async function toggleArtikel(id, aktuellErledigt) {
            try {
                await apiCall(API_URL + '/artikel/' + id, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ erledigt: !aktuellErledigt })
                });
                const a = artikel.find(x => x.id === id);
                if (a) a.erledigt = !aktuellErledigt ? 1 : 0;
                renderArtikel();
            } catch { alert('Fehler beim Aktualisieren.'); }
        }

        async function deleteArtikel(id) {
            try {
                await apiCall(API_URL + '/artikel/' + id, { method: 'DELETE' });
                await loadArtikel();
            } catch { alert('Fehler beim Löschen.'); }
        }
    </script>
</body>
</html>
